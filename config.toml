base_url = "https://cosmevalera.dev/"
title = "Home | Cosme"

compile_sass = true

taxonomies = [
    {name = "tags", feed = true},
]

[markdown]
highlight_code = true
highlight_theme = "monokai"

build_search_index = false

[extra]
blog_post_tags = ["recommended", "for-beginners", "frontend", "backend", "architecture", "finance", "bitcoin", "best-practices", "testing"]

links = [
    { title = "GitHub", url = "https://github.com/CosmeValera", icon = "github" },
    { title = "LinkedIn", url = "https://www.linkedin.com/in/cosmevalera/", icon = "linkedin" }
]

nav = [
    { name = "Projects", path = "/projects/", class = "menu-item" },
    { name = "Blog", path = "/blog/", class = "menu-item" },
    { name = "Readings", path = "/readings/", class = "menu-item" },
]

favicon = "favicon.jpg"

default_language = "en"

